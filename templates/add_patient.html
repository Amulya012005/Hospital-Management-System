<!DOCTYPE html>
<html>
<head>
<title>Add Patient</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Add Patient</h1>

<form method="POST">

<input
type="text"
name="name"
placeholder="Patient Name"
required>

<br><br>

<input
type="number"
name="age"
placeholder="Age"
required>

<br><br>

<input
type="text"
name="disease"
placeholder="Disease"
required>

<br><br>

<button type="submit">
Add Patient
</button>

</form>

</body>
</html>
