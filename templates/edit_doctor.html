<!DOCTYPE html>
<html>
<head>
<title>Edit Doctor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Edit Doctor</h1>

<form method="POST">

<input
type="text"
name="name"
value="{{doctor.name}}"
required>

<br><br>

<input
type="text"
name="specialization"
value="{{doctor.specialization}}"
required>

<br><br>

<input
type="number"
name="experience"
value="{{doctor.experience}}"
required>

<br><br>

<button type="submit">

Update Doctor

</button>

</form>

</body>
</html>
